<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Viva Landscape & Design — Sales Catalog</title>
  <meta name="theme-color" content="#0B0F0D">
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
</head>
<body>

  <!-- Mobile sidebar toggle -->
  <button class="sidebar-toggle" id="sidebar-toggle">☰</button>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <div class="app-layout">

    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <div class="sidebar-brand-logo">V</div>
        <h1>Viva Landscape<br>& Design</h1>
        <p>Sales Catalog</p>
      </div>
      <nav class="sidebar-nav" id="sidebar-nav"></nav>
      <button class="sidebar-collapse-btn" id="sidebar-collapse" title="Collapse sidebar">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 12L6 8l4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </aside>

    <main class="main-content">
      <div style="max-width:1200px;margin:0 auto;padding:20px 32px 0;">
        <div class="search-bar">
          <span class="search-icon">🔍</span>
          <input
            type="text"
            class="search-input"
            id="search-input"
            placeholder="Search products, services, FAQs..."
            oninput="handleSearch(this.value)"
            onfocus="if(this.value.length>=2)document.getElementById('search-results').style.display='block'"
            onblur="setTimeout(()=>document.getElementById('search-results').style.display='none',200)"
          >
          <div id="search-results" style="display:none;position:absolute;top:100%;left:0;right:0;background:var(--bg-raised);border:1px solid var(--border-soft);border-radius:0 0 var(--radius-lg) var(--radius-lg);box-shadow:var(--shadow-lg);z-index:50;max-height:360px;overflow-y:auto;"></div>
        </div>
      </div>
      <div class="content-area" id="content-area"></div>
    </main>

  </div>

  <div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <button class="lightbox-close" onclick="closeLightbox()">✕</button>
    <div class="lightbox-content" onclick="event.stopPropagation()">
      <img src="" alt="Enlarged view">
      <div class="lightbox-caption"></div>
    </div>
  </div>

  <script src="content.js"></script>
  <script src="app.js"></script>

</body>
</html>
