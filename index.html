<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Viva Landscape & Design — Sales Catalog</title>
  <meta name="theme-color" content="#0B0F0D">
  <link rel="stylesheet" href="styles.css?v=6.9">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
</head>
<body>

  <!-- Mobile sidebar toggle -->
  <button class="sidebar-toggle" id="sidebar-toggle">☰</button>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <div class="app-layout">

    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-brand">
          <div class="sidebar-brand-logo">V</div>
          <div class="sidebar-brand-text">
            <h1>Viva Landscape & Design</h1>
            <p>Sales Catalog</p>
          </div>
        </div>
        <button class="sidebar-collapse-btn" id="sidebar-collapse" title="Toggle sidebar">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
        </button>
      </div>
      <nav class="sidebar-nav" id="sidebar-nav"></nav>
    </aside>

    <main class="main-content">
      <div class="search-bar-wrap">
        <div class="search-bar">
          <span class="search-icon">🔍</span>
          <input
            type="text"
            class="search-input"
            id="search-input"
            placeholder="Search products, services, FAQs..."
            oninput="handleSearch(this.value)"
            onfocus="if(this.value.length>=2)document.getElementById('search-results').style.display='block'"
            onblur="setTimeout(()=>document.getElementById('search-results').style.display='none',200)"
          >
          <div id="search-results" style="display:none;position:absolute;top:100%;left:0;right:0;background:var(--bg-raised);border:1px solid var(--border-soft);border-radius:0 0 var(--radius-lg) var(--radius-lg);box-shadow:var(--shadow-lg);z-index:50;max-height:360px;overflow-y:auto;"></div>
        </div>
      </div>
      <div class="content-area" id="content-area"></div>
    </main>

  </div>

  <div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <button class="lightbox-close" onclick="closeLightbox()">✕</button>
    <div class="lightbox-content" onclick="event.stopPropagation()">
      <img src="" alt="Enlarged view">
      <div class="lightbox-caption"></div>
    </div>
  </div>

  <script src="content.js?v=6.9"></script>
  <script src="app.js?v=6.9"></script>

</body>
</html>
